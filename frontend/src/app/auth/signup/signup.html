<div class="parent">
  <div class="signup-container">
    <form id="signup-form" class="signup-form">
      <h2>Create an Account</h2>

      <div class="input-group">
        <label for="username">Full Name</label>
        <input
          [(ngModel)]="registerObj.fullName"
          type="text"
          id="username"
          name="fullName"
          placeholder="Enter your username"
          required
        />
        <small id="username-error" class="error-message"></small>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input [(ngModel)]="registerObj.emailId" type="email" id="email" name="emailId" placeholder="Enter your email" required />
        <small id="email-error" class="error-message"></small>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input
          [(ngModel)]="registerObj.password"
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
        />
        <small id="password-error" class="error-message"></small>
      </div>

      <div class="input-group">
        <label for="confirm-password">Confirm Password</label>
        <input
          [(ngModel)]="registerObj.confirmPassword"
          type="password"
          id="confirm-password"
          name="confirmPassword"
          placeholder="Confirm your password"
          required
        />
        <small id="confirm-password-error" class="error-message"></small>
      </div>

      <button (click)="onRegister()" type="button" class="submit-btn">Sign Up</button>

      <div class="login-link">
        <p>Already have an account? <a routerLink="/login/role-select">Login</a></p>
      </div>
    </form>
  </div>
</div>
