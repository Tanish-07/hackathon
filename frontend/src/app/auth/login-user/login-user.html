<div class="parent">
  <div class="login-container">
    <form class="login-form">
      <h2>User Login</h2>

      <div class="input-group">
        <label for="email">Email</label>
        <input
          [(ngModel)]="loginObj.emailId"
          type="email"
          id="email"
          name="emailId"
          placeholder="Enter your email"
          required
        />
        <small class="error-message"></small>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input
          [(ngModel)]="loginObj.password"
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
        />
        <small class="error-message"></small>
      </div>

      <button (click)="onLogin()" type="button" class="submit-btn">
        Login
      </button>

      <div class="back-link">
        <a routerLink="/login/role-select">← Back to role selection</a>
      </div>
    </form>
  </div>
</div>
